# Config Nginx complete (pas seulement conf.d) : evite que l'entrypoint officiel
# repopule default.conf et casse /live ou le proxy.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log combined;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html solidarite-textile.html;

        location = /live {
            default_type text/plain;
            return 200 "ok\n";
        }

        location /api/pennylane/ {
            proxy_pass http://pennylane-proxy:8765/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        location = /health {
            proxy_pass http://pennylane-proxy:8765/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
