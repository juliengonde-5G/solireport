# ---------------------------------------------------------------------------
# Vhost DEDIE : dashboard.solidata.online (SoliReport)
# ---------------------------------------------------------------------------
# Si https://dashboard.solidata.online ouvre solidata.online, c'est en general :
#   - aucun server_name dashboard.solidata.online sur ce serveur, donc Nginx
#     utilise le bloc default_server (souvent l'appli principale) ;
#   - ou DNS dashboard -> autre IP / CDN qui redirige.
#
# A faire : 1) DNS A (ou AAAA) dashboard.solidata.online -> IP du serveur
#           2) Copier ce fichier dans sites-available, activer le site,
#              certbot --nginx -d dashboard.solidata.online
#           3) nginx -t && systemctl reload nginx
#
# Ne pas mettre default_server sur ce bloc sauf si vous savez ce que vous faites.
# Le bloc ci-dessous ne doit matcher QUE dashboard.solidata.online.

server {
    listen 80;
    listen [::]:80;
    server_name dashboard.solidata.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dashboard.solidata.online;

    # Certbot remplira ces lignes, ou decommentez apres emission du certificat :
    # ssl_certificate /etc/letsencrypt/live/dashboard.solidata.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dashboard.solidata.online/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/solireport;
    index index.html solidarite-textile.html;

    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Proxy API Pennylane (Gunicorn local)
    location /api/pennylane/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8765/health;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
