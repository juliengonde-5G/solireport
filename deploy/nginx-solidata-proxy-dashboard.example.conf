# Configuration pour le conteneur solidata-proxy (nginx:alpine).
# Emplacement habituel : volume monte sur /etc/nginx/conf.d/ (ex. conf.d/dashboard.conf).
#
# Prealable OBLIGATOIRE : solireport-web doit etre sur le MEME reseau Docker que solidata-proxy
# pour que le nom DNS "solireport-web" fonctionne :
#
#   docker network ls
#   docker inspect solidata-proxy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}'
#   docker network connect <NOM_DU_RESEAU_SOLIDATA> solireport-web
#
# Si vous ne pouvez pas connecter les reseaux, remplacez proxy_pass par :
#   proxy_pass http://172.17.0.1:8088;
# (ou host.docker.internal si configure sur le proxy)

server {
    listen 80;
    server_name dashboard.solidata.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://solireport-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
    }
}

