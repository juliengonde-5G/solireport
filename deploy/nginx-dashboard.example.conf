# Exemple Nginx pour dashboard.solidata.online
# Fichiers statiques : racine du depot (solidarite-textile.html, frip-and-co.html, public/)
# Proxy Pennylane : prefixe /api/pennylane/ -> Flask/Gunicorn

server {
    listen 443 ssl http2;
    server_name dashboard.solidata.online;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    root /var/www/solireport;
    index solidarite-textile.html;

    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location /api/pennylane/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8765/health;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
