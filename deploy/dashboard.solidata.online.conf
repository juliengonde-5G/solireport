# A installer dans solidata-proxy sous /etc/nginx/conf.d/
# (copie depuis le depot SoliReport, voir README / deploy/dashboard-routing.md)
#
# Preconditions :
#   docker network connect solidata-network solireport-web   (ou compose a jour avec solidata-network)
#   docker exec solidata-proxy wget -qO- http://solireport-web/live   -> ok

server {
    listen 80;
    server_name dashboard.solidata.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://solireport-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
    }
}

