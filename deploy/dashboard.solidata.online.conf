# =============================================================================
# IMPORTANT : si seul le bloc "listen 80" est actif, le navigateur suit le 301
# vers https://dashboard... puis tombe sur le default_server du PORT 443,
# en general SOLIDATA. Il FAUT un bloc "listen 443 ssl" pour dashboard.solidata.online
# avec un certificat qui contient ce nom (fichier dedie ou SAN sur solidata.online).
# =============================================================================

server {
    listen 80;
    server_name dashboard.solidata.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://solireport-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
    }
}

