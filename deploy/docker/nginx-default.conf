# Nginx dans le conteneur "web" : fichiers statiques + reverse proxy vers pennylane-proxy.
# TLS : gere par votre reverse proxy existant (Docker sur 80/443) vers ce stack sur le port publie.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html solidarite-textile.html;

    # Repond toujours sans appeler le backend (diagnostic : si /live OK mais /health KO -> proxy Python)
    location = /live {
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/pennylane/ {
        proxy_pass http://pennylane-proxy:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /health {
        proxy_pass http://pennylane-proxy:8765/health;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
